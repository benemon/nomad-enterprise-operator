apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "nomad.hashicorp.com/v1alpha1",
          "kind": "NomadCluster",
          "metadata": {
            "name": "nomad"
          },
          "spec": {
            "license": {
              "secretName": "nomad-license"
            },
            "services": {
              "external": {
                "type": "NodePort"
              }
            }
          }
        },
        {
          "apiVersion": "nomad.hashicorp.com/v1alpha1",
          "kind": "NomadCluster",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "nomad-enterprise-operator"
            },
            "name": "nomad-enterprise"
          },
          "spec": {
            "image": {
              "repository": "hashicorp/nomad",
              "tag": "2.0.4-ent"
            },
            "license": {
              "secretName": "nomad-license"
            },
            "monitoring": {
              "enabled": true,
              "prometheusRulesEnabled": true
            },
            "persistence": {
              "size": "10Gi"
            },
            "replicas": 3,
            "resources": {
              "limits": {
                "cpu": "2",
                "memory": "2Gi"
              },
              "requests": {
                "cpu": "500m",
                "memory": "1Gi"
              }
            },
            "server": {
              "acl": {
                "enabled": true
              },
              "audit": {
                "enabled": true
              }
            },
            "services": {
              "external": {
                "type": "LoadBalancer"
              }
            },
            "topology": {
              "region": "global"
            }
          }
        },
        {
          "apiVersion": "nomad.hashicorp.com/v1alpha1",
          "kind": "NomadSnapshot",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "nomad-enterprise-operator"
            },
            "name": "hourly-backup"
          },
          "spec": {
            "clusterRef": {
              "name": "nomad"
            },
            "resources": {
              "limits": {
                "cpu": "500m",
                "memory": "512Mi"
              },
              "requests": {
                "cpu": "100m",
                "memory": "128Mi"
              }
            },
            "schedule": {
              "interval": "1h",
              "retain": 24,
              "stale": false
            },
            "target": {
              "local": {
                "path": "/snapshots",
                "size": "10Gi"
              }
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: Modernization & Migration, Integration & Delivery
    containerImage: quay.io/benjamin_holmes/nomad-enterprise-operator:v0.0.1
    createdAt: "2026-07-13T14:57:37Z"
    description: Community operator for managing HashiCorp Nomad Enterprise clusters
      on Kubernetes and OpenShift. Not maintained or supported by HashiCorp.
    olm.skipRange: '>=0.1.0 <0.0.1'
    operatorframework.io/suggested-namespace: nomad-enterprise-operator-system
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: nomad-enterprise-operator.v0.0.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: NomadCluster is the Schema for the nomadclusters API.
      displayName: Nomad Cluster
      kind: NomadCluster
      name: nomadclusters.nomad.hashicorp.com
      version: v1alpha1
    - description: |-
        NomadSnapshot is the Schema for the nomadsnapshots API.

        The XValidation rule below blocks a mode switch (adding/removing
        spec.schedule) while a one-shot Job is running; recurring mode is
        never blocked.
      displayName: Nomad Snapshot
      kind: NomadSnapshot
      name: nomadsnapshots.nomad.hashicorp.com
      version: v1alpha1
  description: |
    The Nomad Enterprise Operator is a community project that automates the
    deployment and lifecycle management of HashiCorp Nomad Enterprise server
    clusters on Kubernetes and OpenShift.

    This operator is not maintained or supported by HashiCorp. The
    nomad.hashicorp.com API group is a structural identifier, not an
    endorsement.

    Features include TLS certificate management, ACL bootstrap, gossip
    encryption, Prometheus monitoring, OpenShift Routes, persistent storage,
    and automated snapshots.
  displayName: Nomad Enterprise Operator
