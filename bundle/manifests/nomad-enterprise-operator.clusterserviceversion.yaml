    url: https://github.com/benemon/nomad-enterprise-operator
  - name: Nomad Documentation
    url: https://developer.hashicorp.com/nomad
  maintainers:
  - name: benemon
  maturity: alpha
  minKubeVersion: 1.28.0
  provider:
    name: benemon
    url: https://github.com/benemon
  version: 0.0.1
