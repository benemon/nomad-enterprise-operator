---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: nomadautoscalers.nomad.hashicorp.com
spec:
  group: nomad.hashicorp.com
  names:
    kind: NomadAutoscaler
    listKind: NomadAutoscalerList
    plural: nomadautoscalers
    shortNames:
    - nas
    - autoscaler
    singular: nomadautoscaler
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .spec.dynamicApplicationSizing.enabled
      name: DAS
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NomadAutoscaler is the Schema for the nomadautoscalers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NomadAutoscalerSpec defines the desired state of NomadAutoscaler.
              The operator derives all Nomad connection material (address, CA,
              ACL token) from ClusterRef; scaling policies are not authored here —
              horizontal application scaling and Dynamic Application Sizing
              policies live in job specifications and flow through the agent's
              Nomad policy source.
            properties:
              clusterRef:
                description: ClusterRef references the NomadCluster the autoscaler
                  acts on
                properties:
                  name:
                    description: Name of the NomadCluster
                    type: string
                  namespace:
                    description: Namespace of the NomadCluster (defaults to same namespace
                      as NomadSnapshot)
                    type: string
                required:
                - name
                type: object
              dynamicApplicationSizing:
                description: DynamicApplicationSizing configuration (Nomad Enterprise).
                properties:
                  enabled:
                    default: false
                    description: Enabled turns on Dynamic Application Sizing support
                    type: boolean
                type: object
              enableDebug:
                default: false
                description: EnableDebug exposes the agent's pprof endpoints
                type: boolean
              image:
                description: |-
                  Image for the autoscaler agent. Dynamic Application Sizing
                  requires the enterprise image (the default).
                properties:
                  digest:
                    description: |-
                      Digest optionally pins the image by content digest. When set, the
                      reference is `repository@digest` and Tag is ignored.
                    pattern: ^sha256:[a-f0-9]{64}$
                    type: string
                  pullPolicy:
                    default: Always
                    description: |-
                      PullPolicy defaults to Always as a defence against registry-side
                      retags.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    default: hashicorp/nomad-autoscaler-enterprise
                    description: Repository is the container image repository
                    type: string
                  tag:
                    default: 0.5.0-ent
                    description: |-
                      Tag is the container image tag, default-pinned to a concrete
                      version so a registry-side retag cannot change the running agent
                      mid-roll.
                    pattern: ^[A-Za-z0-9._-]+$
                    type: string
                type: object
              logLevel:
                default: INFO
                description: LogLevel for the agent
                enum:
                - DEBUG
                - INFO
                - WARN
                type: string
              monitoring:
                description: Monitoring configuration for the agent's metrics endpoint
                properties:
                  enabled:
                    default: true
                    description: |-
                      Enabled determines if monitoring resources are created
                      Pointer + omitempty is load-bearing: a plain bool either drops
                      explicit false (omitempty: apiserver re-defaults it true on the
                      operator's next write) or writes false into fields the user
                      never set (no omitempty: the zero value overwrites the default).
                      nil means "user said nothing" and reads as the default via
                      IsEnabled().
                    type: boolean
                type: object
              namespaces:
                default:
                - default
                description: |-
                  Namespaces are the Nomad namespaces the agent may observe and
                  scale. Drives both the agent configuration and the scope of the
                  ACL policy the operator mints. "*" grants all namespaces and
                  must be the only entry when present.
                items:
                  pattern: ^(\*|[A-Za-z0-9][A-Za-z0-9_-]*)$
                  type: string
                minItems: 1
                type: array
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector for agent pod scheduling
                type: object
              replicas:
                default: 1
                description: |-
                  Replicas is the number of agent pods. Values above 1 enable the
                  agent's high-availability mode: replicas form a leader-election
                  group over a Nomad Variables lock and only the leader evaluates
                  policies. The lock path is operator-owned and unique per
                  NomadAutoscaler, so distinct instances never share an election.
                format: int32
                maximum: 3
                minimum: 1
                type: integer
              resources:
                description: Resources defines CPU and memory for the agent
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              tolerations:
                description: Tolerations for agent pod scheduling
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
            required:
            - clusterRef
            type: object
            x-kubernetes-validations:
            - message: 'namespaces: "*" must be the only entry when present'
              rule: '!(''*'' in self.namespaces) || size(self.namespaces) == 1'
          status:
            description: NomadAutoscalerStatus defines the observed state of NomadAutoscaler.
            properties:
              conditions:
                description: Conditions represent the latest observations of the agent
                  state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configMapName:
                description: ConfigMapName is the name of the agent configuration
                  ConfigMap
                type: string
              deploymentName:
                description: DeploymentName is the name of the agent Deployment
                type: string
              desiredReplicas:
                description: DesiredReplicas is the desired number of agent replicas
                format: int32
                type: integer
              nomadAddress:
                description: NomadAddress is the internal Nomad cluster address used
                  by the agent
                type: string
              observedGeneration:
                description: ObservedGeneration is the last observed generation
                format: int64
                type: integer
              policyName:
                description: |-
                  PolicyName is the Nomad ACL policy created for the agent.
                  Stored here so it can be cleaned up when the NomadAutoscaler is
                  deleted.
                type: string
              readyReplicas:
                description: ReadyReplicas is the number of ready agent replicas
                format: int32
                type: integer
              tokenAccessorID:
                description: TokenAccessorID is the Nomad ACL token accessor ID for
                  cleanup
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
