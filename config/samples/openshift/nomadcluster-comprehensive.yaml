# Comprehensive OpenShift NomadCluster - production-ready 3-replica configuration
#
# This CR exercises the full feature set available on OpenShift:
#   - 3-replica HA cluster with pod anti-affinity
#   - Operator-managed TLS with auto-generated CA and certificates
#   - ACL with auto-bootstrap
#   - Audit logging with persistent storage
#   - OpenShift Route with reencrypt TLS termination (auto-configured when TLS enabled)
#   - ServiceMonitor and PrometheusRule for observability
#   - Custom resource limits for production workloads
#
apiVersion: nomad.hashicorp.com/v1alpha1
kind: NomadCluster
metadata:
  name: nomad-enterprise
spec:
  replicas: 3
  image:
    repository: hashicorp/nomad
    tag: "2.0.4-ent"
  license:
    secretName: nomad-license
  topology:
    region: global
    # datacenter defaults to namespace if empty
  openshift:
    enabled: true
    route:
      enabled: true
      # Route always uses reencrypt termination with HTTP→HTTPS redirect.
      # To use a custom external certificate instead of the platform wildcard:
      # tls:
      #   certificateSecretName: my-route-cert  # Secret with tls.crt and tls.key
      #   secretKeys:                           # Override key names if needed
      #     certificate: tls.crt                # default: tls.crt
      #     privateKey: tls.key                 # default: tls.key
  monitoring:
    enabled: true
    prometheusRulesEnabled: true
    # Scrape cadence is operator-owned per ADR 0003 (30s interval, 10s timeout).
  # External KMS keyring (recommended for production — see the README's
  # keyring section for why aead snapshots are a key-custody risk).
  # On OpenShift the ephemeral ServiceAccount vector works unchanged:
  # the operator mints the SA token via the TokenRequest API, so no
  # SCC or ClusterRoleBinding changes are needed on the Nomad side —
  # Vault-side TokenReview prerequisites are documented in the README's
  # auth-delegator table.
  # server:
  #   keyrings:
  #   - name: primary
  #     transit:
  #       address: "https://vault.example.com:8200"
  #       keyName: nomad-keyring
  #       mountPath: transit/
  #       auth:
  #         method: kubernetes
  #         mount: kubernetes
  #         kubernetes:
  #           role: nomad-keyring
  server:
    acl:
      enabled: true
    # mTLS is always enabled. The operator generates CA and all certificates.
    # To use your own CA (e.g. from Vault PKI):
    # tls:
    #   ca:
    #     secretName: nomad-ca  # Secret with tls.crt and tls.key
    #     secretKeys:           # Override key names for ESO/VSO-shaped Secrets
    #       certificate: tls.crt
    #       privateKey: tls.key
    # Autopilot is operator-owned per ADR 0003 (cleanup dead servers,
    # 200ms last-contact, 250 trailing logs, 10s stabilization).
    audit:
      enabled: true
      size: 5Gi
      # Delivery (enforced), format (json), and rotation (24h × 15 files)
      # are operator-owned per ADR 0003.
    # GC retention: how long terminal job/eval/alloc history is kept
    # before garbage collection. Unset fields keep Nomad's own defaults
    # (job 4h, batch-eval 24h, eval 1h). Lower for high-churn dispatch
    # workloads to reclaim leader memory sooner:
    # gc:
    #   jobHistory: "1h"
    #   batchEvalHistory: "2h"
    #   evalHistory: "30m"
  persistence:
    size: 10Gi
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  # Pod anti-affinity is operator-owned per ADR 0003 (preferred, weight 100,
  # hostname topology, applied at replicas >= 3). Use
  # spec.topologySpreadConstraints for multi-zone distribution.
