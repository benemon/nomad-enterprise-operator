apiVersion: nomad.hashicorp.com/v1alpha1
kind: NomadCluster
metadata:
  labels:
    app.kubernetes.io/name: nomad-enterprise-operator
    app.kubernetes.io/managed-by: kustomize
  name: nomad-enterprise
spec:
  replicas: 3
  image:
    repository: hashicorp/nomad
    tag: "1.11-ent"
  license:
    # Option 1: Reference an existing secret
    secretName: nomad-license
    secretKey: license
    # Option 2: Provide license inline (operator creates/manages secret)
    # value: "<your-license-content>"
  topology:
    region: global
    # datacenter defaults to namespace if empty
  services:
    external:
      type: LoadBalancer
      # loadBalancerIP: "10.0.0.100"  # Optional: request specific IP
  openshift:
    enabled: true
    route:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    monitoring:
      enabled: true
      scrapeInterval: 30s
      scrapeTimeout: 10s
      prometheusRulesEnabled: true
  server:
    acl:
      enabled: true  # Auto-bootstrapped by operator
    tls:
      enabled: false
      # When enabled, provide certificates via:
      # Option 1: Reference an existing secret (default keys: ca.crt, server.crt, server.key)
      # secretName: nomad-tls
      # Option 1b: With cert-manager or other providers that use different key names:
      # secretName: nomad-tls
      # secretKeys:
      #   caCert: ca.crt        # default: ca.crt
      #   serverCert: tls.crt   # default: server.crt
      #   serverKey: tls.key    # default: server.key
      # Option 2: Provide inline certificates (operator creates/manages secret)
      # caCert: |
      #   -----BEGIN CERTIFICATE-----
      #   ...
      #   -----END CERTIFICATE-----
      # serverCert: |
      #   -----BEGIN CERTIFICATE-----
      #   ...
      #   -----END CERTIFICATE-----
      # serverKey: |
      #   -----BEGIN RSA PRIVATE KEY-----
      #   ...
      #   -----END RSA PRIVATE KEY-----
    autopilot:
      cleanupDeadServers: true
      lastContactThreshold: "200ms"
      maxTrailingLogs: 250
      serverStabilizationTime: "10s"
    audit:
      enabled: true
      format: json
      rotateDuration: "24h"
      rotateMaxFiles: 15
  persistence:
    size: 10Gi
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  affinity:
    podAntiAffinity:
      enabled: true
      type: preferred
      weight: 100
      topologyKey: kubernetes.io/hostname
