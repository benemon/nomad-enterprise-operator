# Adds namespace to all resources.
namespace: nomad-enterprise-operator-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: nomad-enterprise-operator-

# Labels to add to all resources and selectors.
#labels:
#- includeSelectors: true
#  pairs:
#    someName: someValue

resources:
- ../crd
- ../rbac
- ../manager
# Admission validation is enforced entirely via CRD-schema CEL rules
# (x-kubernetes-validations) and kubebuilder enum tags. See neo-bqb for the
# decision to delete the operator-managed validating webhook scaffolding —
# the cert lifecycle was higher operational cost than the single rule
# (replicas-in-{1,3,5}) it enforced, which the CRD enum tag already covers.
# [PROMETHEUS] To enable prometheus monitor, uncomment all sections with 'PROMETHEUS'.
#- ../prometheus
# [METRICS] Expose the controller manager metrics service.
- metrics_service.yaml
# [NETWORK POLICY] Protect the /metrics endpoint with NetworkPolicy.
# Only Pod(s) running a namespace labeled with 'metrics: enabled' will be able to gather the metrics.
#- ../network-policy

# Uncomment the patches line if you enable Metrics
patches:
# [METRICS] The following patch will enable the metrics endpoint using HTTPS and the port :8443.
# More info: https://book.kubebuilder.io/reference/metrics
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment

# Uncomment the patches line if you enable Metrics and CertManager
# [METRICS-WITH-CERTS] To enable metrics protected with certManager, uncomment the following line.
# This patch will protect the metrics with certManager self-signed certs.
#- path: cert_metrics_manager_patch.yaml
#  target:
#    kind: Deployment

# cert-manager + webhook scaffolding from the kubebuilder default has been
# removed: the operator has no admission webhook (see neo-bqb) and the
# metrics server uses controller-runtime's self-signed default. If a future
# tranche needs cert-manager-managed certs, regenerate the relevant blocks
# from the upstream kubebuilder template rather than carrying dead-by-
# default scaffold in this file.
