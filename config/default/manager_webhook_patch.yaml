# Expose the webhook port and provide a writable cert dir on the manager
# Deployment. The cert files are written by internal/webhook/bootstrap.go
# (Tree 1 in the operator's two-cert-tree model) — no cert-manager required.
#
# An emptyDir (NOT a Secret mount) is intentional: the bootstrap is the
# producer of the cert files. The Secret exists for cross-pod consistency
# and rotation discovery, but the pod's local cert files are written by
# the bootstrap into the writable dir. A read-only Secret mount would
# (a) be empty on first install before the bootstrap creates the Secret,
# and (b) prevent the bootstrap from seeding certwatcher synchronously.
#
# POD_NAMESPACE is already set in config/manager/manager.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
        - name: manager
          ports:
            - name: webhook-server
              containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: webhook-tls
              mountPath: /tmp/k8s-webhook-server/serving-certs
      volumes:
        - name: webhook-tls
          emptyDir: {}
