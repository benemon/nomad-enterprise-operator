# The operator's self-ServiceMonitor authenticates scrapes with the
# operator's own ServiceAccount token (secret-backed authorization —
# OpenShift user-workload monitoring prohibits file-path auth). That
# identity must pass the metrics endpoint's authorization check.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-scraper-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metrics-reader
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: system
