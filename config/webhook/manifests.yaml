---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-nomad-hashicorp-com-v1alpha1-nomadcluster
  failurePolicy: Fail
  name: mnomadcluster.kb.io
  rules:
  - apiGroups:
    - nomad.hashicorp.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - nomadclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-nomad-hashicorp-com-v1alpha1-nomadcluster
  failurePolicy: Fail
  name: vnomadcluster.kb.io
  rules:
  - apiGroups:
    - nomad.hashicorp.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - nomadclusters
  sideEffects: None
