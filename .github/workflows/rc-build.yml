name: RC Build

# Feature-branch pushes produce tested release-candidate images. Each
# image carries the quay.expires-after label (same pattern as the
# ceph-aio sibling repo), so Quay deletes RC tags automatically after
# the period below — no manual registry tidy-up.

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
  workflow_dispatch: {}

env:
  IMAGE_TAG_BASE: quay.io/benjamin_holmes/nomad-enterprise-operator
  RC_EXPIRY: 4w

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: lint
    uses: ./.github/workflows/test.yml

  rc-build:
    needs: test
    name: Build and Push RC Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Derive RC tag from branch and commit
        run: |
          # feat/nomadautoscaler-cr @ abc1234 -> rc-feat-nomadautoscaler-cr-abc1234
          BRANCH_SLUG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr -cd 'a-zA-Z0-9._-' | tr '[:upper:]' '[:lower:]')
          echo "RC_TAG=rc-${BRANCH_SLUG}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push RC image with expiration label
        run: |
          make docker-buildx \
            IMG=${{ env.IMAGE_TAG_BASE }}:${{ env.RC_TAG }} \
            PLATFORMS=linux/amd64,linux/arm64 \
            DOCKER_BUILD_EXTRA_ARGS="--label quay.expires-after=${{ env.RC_EXPIRY }}"

      - name: Generate workflow summary
        run: |
          echo "# RC Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_TAG_BASE }}:${{ env.RC_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Expires:** ${{ env.RC_EXPIRY }} after push (quay.expires-after)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy to the lab with:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "make deploy IMG=${{ env.IMAGE_TAG_BASE }}:${{ env.RC_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
