name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_TAG_BASE: quay.io/benjamin_holmes/nomad-enterprise-operator

jobs:
  release:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Log in to quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push operator image
        run: |
          make docker-buildx \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ env.VERSION }} \
            PLATFORMS=linux/amd64,linux/arm64

      - name: Generate bundle
        run: |
          make bundle \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ env.VERSION }} \
            VERSION=${{ env.VERSION }}

      - name: Build and push bundle image
        run: |
          make bundle-build bundle-push \
            BUNDLE_IMG=${{ env.IMAGE_TAG_BASE }}-bundle:v${{ env.VERSION }}

      - name: Build and push catalog image
        run: |
          make catalog-build catalog-push \
            CATALOG_IMG=${{ env.IMAGE_TAG_BASE }}-catalog:v${{ env.VERSION }} \
            BUNDLE_IMGS=${{ env.IMAGE_TAG_BASE }}-bundle:v${{ env.VERSION }}
