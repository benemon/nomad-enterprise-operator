name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_TAG_BASE: quay.io/benjamin_holmes/nomad-enterprise-operator

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: lint
    uses: ./.github/workflows/test.yml
    # Called workflows request checks:write for the JUnit reporters; the
    # caller must grant it or the run fails at startup.
    permissions:
      contents: read
      checks: write

  test-e2e:
    needs: test
    uses: ./.github/workflows/test-e2e.yml
    permissions:
      contents: read
      checks: write
    with:
      # Releases gate on the COMPLETE suite — scale-down, version
      # upgrade, leader failover — not the reduced PR lane (neo-bf9).
      lane: full
    secrets:
      NOMAD_LICENSE: ${{ secrets.NOMAD_LICENSE }}

  release:
    needs: test-e2e
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      # contents: write for the GitHub Release step below.
      contents: write
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Log in to quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push operator image
        run: |
          make docker-buildx \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ env.VERSION }} \
            PLATFORMS=linux/amd64,linux/arm64

      - name: Generate bundle
        run: |
          make bundle \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ env.VERSION }} \
            VERSION=${{ env.VERSION }}

      - name: Build and push bundle image
        run: |
          make bundle-build bundle-push \
            BUNDLE_IMG=${{ env.IMAGE_TAG_BASE }}-bundle:v${{ env.VERSION }}

      - name: Build and push catalog image
        run: |
          make catalog-build catalog-push \
            CATALOG_IMG=${{ env.IMAGE_TAG_BASE }}-catalog:v${{ env.VERSION }} \
            BUNDLE_IMGS=${{ env.IMAGE_TAG_BASE }}-bundle:v${{ env.VERSION }}

      - name: Build installer manifest
        run: |
          make build-installer \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ env.VERSION }}

      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prerelease for any tag with a hyphenated qualifier (rc, beta).
          PRERELEASE=""
          case "${GITHUB_REF_NAME}" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" --generate-notes ${PRERELEASE}

      - name: Upload installer manifest to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/install.yaml \
            --repo "${GITHUB_REPOSITORY}" --clobber
