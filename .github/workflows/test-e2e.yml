name: E2E Tests

# PR/push lane of the e2e matrix (neo-g1o / design review §2.10): runs
# the functional suite but SKIPS the slow containers — scale-down,
# version upgrade, leader failover — which run in nightly-e2e.yml.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:
    secrets:
      NOMAD_LICENSE:
        required: true

permissions:
  contents: read
  checks: write

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Write Nomad Enterprise license file
        env:
          NOMAD_LICENSE: ${{ secrets.NOMAD_LICENSE }}
        run: |
          mkdir -p test/e2e/testdata
          echo "${NOMAD_LICENSE}" > test/e2e/testdata/nomad.hclic

      - name: Running Test e2e (PR lane - slow containers skipped)
        run: |
          go mod tidy
          make test-e2e JUNIT_REPORT=e2e-pr.xml GINKGO_SKIP='scale-down|version upgrade|leader failover|Keyring lifecycle|Keyring transit auth|Keyring HA pair|Keyring resilience|Multi-namespace fleet|Minimal sample quickstart'

      # Dependabot-triggered runs get a read-only token that cannot
      # create check runs, so the report step is skipped for them.
      - name: Publish test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ always() && github.actor != 'dependabot[bot]' }}
        with:
          name: E2E Test Results (PR lane)
          path: e2e-pr.xml
          reporter: java-junit
          use-actions-summary: false

      - name: Upload test report artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-pr-junit
          path: e2e-pr.xml
