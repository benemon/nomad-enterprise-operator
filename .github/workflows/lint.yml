name: Lint

on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to the Makefile's GOLANGCI_LINT_VERSION — 'latest' drifts
          # and fails CI on checks the local toolchain cannot reproduce. The
          # pinned release must be built with a Go >= go.mod's version or the
          # prebuilt binary refuses to load the config (v2.1.0 was go1.24).
          version: v2.12.2
