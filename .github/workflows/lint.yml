name: Lint

# Feature branches are covered by pull_request events and by rc-build.yml
# (feat/**, fix/**), which calls this workflow — an unscoped push trigger
# would run everything twice per push (neo-bf9).
on:
  push:
    branches: [main, stability]
  pull_request:
  workflow_call:

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to the Makefile's GOLANGCI_LINT_VERSION — 'latest' drifts
          # and fails CI on checks the local toolchain cannot reproduce. The
          # pinned release must be built with a Go >= go.mod's version or the
          # prebuilt binary refuses to load the config (v2.1.0 was go1.24).
          version: v2.12.2
