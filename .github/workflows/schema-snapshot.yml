name: Schema snapshot

# F2b (neo-42h): catch unintentional CRD drift. The committed baselines
# under test/schema-snapshots/ are the post-B3 v1alpha2 surface; any Go
# type change that alters the rendered CRD must be accompanied by a
# regenerated snapshot in the same PR. The workflow regenerates the
# baseline and fails CI if the working tree is dirty.
#
# To fix a failure: run `make generate-schema-snapshots` locally and
# commit the resulting diff. See ADR 0002 (F2a) for the broader CI
# scaffolding rationale; this workflow is the schema half.

on:
  pull_request:
    branches: [main, stability]
  push:
    branches: [main, stability]

permissions:
  contents: read

jobs:
  schema-snapshot:
    name: CRD drift gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate CRDs and refresh snapshots
        run: make generate-schema-snapshots

      - name: Fail if rendered CRDs drifted from committed baselines
        run: |
          set -uo pipefail
          # Both directories are regenerated by `make generate-schema-snapshots`:
          # config/crd/bases/ is the operator's actual CRD source, and
          # test/schema-snapshots/ is the reviewer-facing baseline copy.
          # A clean working tree here means: the Go types, the rendered CRDs,
          # and the committed snapshot are all in sync.
          if ! git diff --exit-code -- config/crd/bases/ test/schema-snapshots/; then
            echo "::error::CRD drift detected. Run \`make generate-schema-snapshots\` locally and commit the diff. The drift is shown above."
            exit 1
          fi
          echo "OK — CRDs and snapshots are in sync."
