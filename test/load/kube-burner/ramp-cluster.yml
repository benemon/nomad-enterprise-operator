# Ramp-to-failure target (neo-1je) — applied with oc, NOT a kube-burner
# template. One long-lived HA cluster at the operand's shipped defaults:
# resources omitted => operator defaults (req 250m/512Mi, lim 2/2Gi);
# services.external.type omitted => LoadBalancer (CRD default); persistence
# omitted => 10Gi PVC on the default StorageClass. The UI is served on the
# LB HTTP port: https://<status.advertiseAddress>:4646 (log in with the
# ramp-acl-bootstrap token). OCP lane only: openshift.enabled passes
# restricted-v2.
apiVersion: nomad.hashicorp.com/v1alpha1
kind: NomadCluster
metadata:
  name: ramp
  namespace: nomad-load
spec:
  replicas: 3
  license:
    secretName: nomad-license
  openshift:
    enabled: true
    # Operator-managed Route for the Nomad UI (reencrypt, HTTP->HTTPS
    # redirect, backs <cluster>-internal). Enabling it does not roll the
    # StatefulSet — the Route phase touches no certs/HCL/pod template.
    route:
      enabled: true
