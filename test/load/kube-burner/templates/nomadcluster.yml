apiVersion: nomad.hashicorp.com/v1alpha1
kind: NomadCluster
metadata:
  name: load-{{ .Iteration }}
spec:
  replicas: 1
  license:
    secretName: nomad-license
  persistence:
    size: ""
  services:
    external:
      type: NodePort
  # SCC-compatible pods on OpenShift (no Route: route.enabled stays
  # false, so NodePort remains the external service). The kind lane
  # passes false and keeps the fixed non-root UID.
  openshift:
    enabled: {{ .openshift }}
  # Operand pod-sizing knob (neo-31u floor sweep). Unset => block omitted,
  # so servers inherit the operator defaults (req 250m/512Mi, lim 2/2Gi).
  # SERVER_CPU/SERVER_MEMORY set request==limit (Guaranteed QoS) so the
  # OOM/throttle boundary is the value under test; either may be set alone
  # (the operator fills the unset fields from its per-field defaults).
  {{- if or .server_cpu .server_memory }}
  resources:
    requests:
      {{- if .server_cpu }}
      cpu: "{{ .server_cpu }}"
      {{- end }}
      {{- if .server_memory }}
      memory: "{{ .server_memory }}"
      {{- end }}
    limits:
      {{- if .server_cpu }}
      cpu: "{{ .server_cpu }}"
      {{- end }}
      {{- if .server_memory }}
      memory: "{{ .server_memory }}"
      {{- end }}
  {{- end }}
  # Operand GC retention (neo-dgf levers). Unset => operator/Nomad
  # defaults (job 4h / batch-eval 24h / eval 1h); set to reclaim dead
  # job/eval/alloc state sooner and probe its effect on the memory floor.
  {{- if or .job_gc .batch_eval_gc .eval_gc }}
  server:
    gc:
      {{- if .job_gc }}
      jobHistory: "{{ .job_gc }}"
      {{- end }}
      {{- if .batch_eval_gc }}
      batchEvalHistory: "{{ .batch_eval_gc }}"
      {{- end }}
      {{- if .eval_gc }}
      evalHistory: "{{ .eval_gc }}"
      {{- end }}
  {{- end }}
